<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全球机票特殊事件AI预警</title>
  <meta name="description" content="全球机票特殊事件AI预警，覆盖航空安全、地缘政治、极端天气、航司运营异常四大维度">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z' fill='%233b82f6'/></svg>">
  <link rel="stylesheet" href="css/style.css?v=20260622a">
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
</head>
<body>
  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-content">
      <div class="nav-brand">
        <div class="nav-logo">
          <svg viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>
        </div>
        <span class="nav-title">全球机票特殊事件AI预警</span>
      </div>
      <div class="nav-right">
        <div class="nav-links">
          <a href="archive.html" class="nav-link">历史报告</a>
        </div>
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="切换主题">
          <svg viewBox="0 0 24 24"><path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.95h-2V3.5h2V.55zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.7l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zM20 10.5v2h3v-2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16.95h2V19.5h-2v2.95zm-7.45-3.91l1.41 1.41 1.79 1.8-1.41 1.41-1.79 1.8z"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main">
    <div class="container">
      <!-- Page Header with Date Switcher -->
      <div class="page-header">
        <h1 class="page-title">全球机票特殊事件AI预警</h1>
        <div class="page-meta">
          <div class="date-switcher">
            <button class="date-nav-btn" id="prevDate" onclick="switchDate(-1)" title="前一天">
              <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </button>
            <span class="date-display" id="dateDisplay">加载中...</span>
            <button class="date-nav-btn" id="nextDate" onclick="switchDate(1)" title="后一天">
              <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </button>
          </div>
          <span>
            <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
            <span id="lastUpdate">--</span>
          </span>
        </div>
      </div>

      <!-- Stats Cards -->
      <div class="stats-grid" id="statsGrid"></div>

      <!-- 全量筛选器 -->
      <div class="full-filter-bar" id="fullFilterBar">
        <!-- 时间筛选 -->
        <div class="filter-group filter-group-time">
          <span class="filter-label">📅 时间</span>
          <div class="filter-time-controls">
            <div class="filter-time-inputs">
              <input type="date" id="filterDateStart" class="filter-date-input" title="开始日期">
              <span class="filter-date-sep">~</span>
              <input type="date" id="filterDateEnd" class="filter-date-input" title="结束日期">
            </div>
            <div class="filter-time-shortcuts">
              <button class="filter-shortcut-btn active" data-range="today" onclick="setDateShortcut('today')">今天</button>
              <button class="filter-shortcut-btn" data-range="3d" onclick="setDateShortcut('3d')">近3天</button>
              <button class="filter-shortcut-btn" data-range="7d" onclick="setDateShortcut('7d')">近7天</button>
              <button class="filter-shortcut-btn" data-range="all" onclick="setDateShortcut('all')">全部</button>
            </div>
          </div>
        </div>
        <!-- 等级筛选 -->
        <div class="filter-group filter-group-priority">
          <span class="filter-label">⚡ 等级</span>
          <div class="filter-priority">
            <button class="filter-btn active" data-priority="all" onclick="setFilter('priority','all')">全部</button>
            <button class="filter-btn" data-priority="P0" onclick="setFilter('priority','P0')">P0</button>
            <button class="filter-btn" data-priority="P1" onclick="setFilter('priority','P1')">P1</button>
            <button class="filter-btn" data-priority="P2" onclick="setFilter('priority','P2')">P2</button>
          </div>
        </div>
        <!-- 类型筛选 -->
        <div class="filter-group filter-group-category">
          <span class="filter-label">🏷️ 类型</span>
          <div class="filter-category">
            <button class="filter-btn active" data-category="all" onclick="setFilter('category','all')">全部</button>
            <button class="filter-btn" data-category="航空安全" onclick="setFilter('category','航空安全')">航空安全</button>
            <button class="filter-btn" data-category="航司运营异常" onclick="setFilter('category','航司运营异常')">航司运营异常</button>
            <button class="filter-btn" data-category="自然灾害" onclick="setFilter('category','自然灾害')">自然灾害</button>
            <button class="filter-btn" data-category="地缘政治" onclick="setFilter('category','地缘政治')">地缘政治</button>
          </div>
        </div>
        <!-- 地区筛选 -->
        <div class="filter-group filter-group-region">
          <span class="filter-label">🌍 地区</span>
          <div class="filter-region">
            <button class="filter-btn active" data-region="all" onclick="setFilter('region','all')">全部</button>
            <button class="filter-btn" data-region="domestic" onclick="setFilter('region','domestic')">境内</button>
            <button class="filter-btn" data-region="international" onclick="setFilter('region','international')">境外</button>
          </div>
        </div>
        <!-- 搜索 + 计数 -->
        <div class="filter-group filter-group-search">
          <div class="filter-search">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input type="text" id="filterSearch" placeholder="搜索事件、机场、航司...">
          </div>
          <span class="filter-count" id="filterCount">- 条</span>
        </div>
      </div>

      <!-- Two Column Layout: Map + Event List -->
      <div class="content-grid">
        <!-- Left: Map -->
        <div class="map-section">
          <div class="section-header">
            <h2 class="section-title">
              <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
              事件分布地图
            </h2>
          </div>
          <div class="map-container">
            <div id="indexMap"></div>
          </div>
          <div class="legend">
            <div class="legend-item"><div class="legend-dot p0"></div>P0 紧急</div>
            <div class="legend-item"><div class="legend-dot p1"></div>P1 重要</div>
            <div class="legend-item"><div class="legend-dot p2"></div>P2 关注</div>
          </div>
        </div>

        <!-- Right: Event List -->
        <div class="event-list-section">
          <!-- Event List -->
          <div class="event-list" id="eventList">
            <div class="loading">
              <div class="spinner"></div>
              加载中...
            </div>
          </div>
        </div>
      </div>

      <!-- Flight Anomalies (if any, below the grid) -->
      <div id="flightAnomalies"></div>

      <!-- Sources -->
      <div id="sourcesSection"></div>
    </div>
  </main>

  <!-- Event Detail Modal -->
  <div class="modal-overlay" id="eventModal">
    <div class="modal-content">
      <button class="modal-close" id="modalClose" onclick="closeEventModal()">&times;</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="https://cdn.bootcdn.net/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="js/config.js?v=20260618a"></script>
  <script src="js/report-common.js?v=20260618a"></script>
  <script src="js/dashboard.js?v=20260622a"></script>
</body>
</html>
