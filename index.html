<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全球机票风险事件监测 - Dashboard</title>
  <meta name="description" content="全球机票风险事件实时监测看板，覆盖航空安全、地缘政治、极端天气、航司运营异常四大维度">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z' fill='%233b82f6'/></svg>">
  <link rel="stylesheet" href="css/style.css?v=20260611b">
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
</head>
<body>
  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-content">
      <div class="nav-brand">
        <div class="nav-logo">
          <svg viewBox="0 0 24 24"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>
        </div>
        <span class="nav-title">全球机票风险事件监测</span>
      </div>
      <div class="nav-right">
        <div class="nav-links">
          <a href="index.html" class="nav-link active">看板</a>
          <a href="archive.html" class="nav-link">历史报告</a>
        </div>
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="切换主题">
          <svg viewBox="0 0 24 24"><path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.95h-2V3.5h2V.55zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.7l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zM20 10.5v2h3v-2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16.95h2V19.5h-2v2.95zm-7.45-3.91l1.41 1.41 1.79-1.8-1.41-1.41-1.79 1.8z"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main">
    <div class="container">
      <!-- Page Header -->
      <div class="page-header">
        <h1 class="page-title">风险事件看板</h1>
        <div class="page-meta" id="pageMeta">
          <span>
            <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM9 10H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm-8 4H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/></svg>
            <span id="currentDate">加载中...</span>
          </span>
          <span>
            <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
            <span id="lastUpdate">--</span>
          </span>
        </div>
      </div>

      <!-- Stats Cards -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card p0">
          <div class="stat-label">🔴 P0 紧急事件</div>
          <div class="stat-value" id="p0Count">-</div>
          <div class="stat-desc">需立即处理</div>
        </div>
        <div class="stat-card p1">
          <div class="stat-label">🟠 P1 重要事件</div>
          <div class="stat-value" id="p1Count">-</div>
          <div class="stat-desc">需关注处理</div>
        </div>
        <div class="stat-card p2">
          <div class="stat-label">🟡 P2 关注事件</div>
          <div class="stat-value" id="p2Count">-</div>
          <div class="stat-desc">持续监控</div>
        </div>
        <div class="stat-card total">
          <div class="stat-label">📊 总计事件</div>
          <div class="stat-value" id="totalCount">-</div>
          <div class="stat-desc">所有风险事件</div>
        </div>
      </div>

      <!-- Filter Bar -->
      <div class="filter-bar">
        <div class="filter-group">
          <span class="filter-label">等级</span>
          <div class="filter-priority">
            <button class="filter-btn active" data-value="all">全部</button>
            <button class="filter-btn" data-value="P0">P0</button>
            <button class="filter-btn" data-value="P1">P1</button>
            <button class="filter-btn" data-value="P2">P2</button>
          </div>
        </div>
        <div class="filter-group">
          <span class="filter-label">话题</span>
          <div class="filter-category">
            <button class="filter-btn active" data-value="all">全部</button>
          </div>
        </div>
        <div class="filter-group filter-search">
          <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          <input type="text" id="searchInput" placeholder="搜索事件、机场、航司..." />
        </div>
        <div class="filter-count">
          <span id="filteredCount">0/0</span>
        </div>
      </div>

      <!-- Content Grid -->
      <div class="content-grid">
        <!-- Map Section -->
        <div class="map-section">
          <div class="section-header">
            <h2 class="section-title">
              <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
              全球风险地图
            </h2>
          </div>
          <div class="map-container">
            <div id="riskMap"></div>
          </div>
          <div class="legend">
            <div class="legend-item"><span class="legend-dot p0"></span> P0 紧急</div>
            <div class="legend-item"><span class="legend-dot p1"></span> P1 重要</div>
            <div class="legend-item"><span class="legend-dot p2"></span> P2 关注</div>
          </div>
        </div>

        <!-- Event List -->
        <div class="event-list-section">
          <div class="section-header">
            <h2 class="section-title">
              <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
              今日最新事件
            </h2>
          </div>
          <div class="event-list" id="eventList">
            <div class="loading">
              <div class="spinner"></div>
              加载中...
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.bootcdn.net/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="js/config.js?v=20260611b"></script>
  <script src="js/map.js?v=20260611b"></script>
  <script src="js/dashboard.js?v=20260611b"></script>
</body>
</html>
